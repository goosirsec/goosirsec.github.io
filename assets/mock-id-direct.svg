<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="630" viewBox="0 0 1000 630" role="img" aria-labelledby="title description">
  <title id="title">Directly referenced synthetic mock identity card</title>
  <desc id="description">A fictional Testland identity card containing synthetic comparison data and a prominent mock watermark.</desc>
  <rect width="1000" height="630" fill="#f6f9fd"/>
  <rect width="1000" height="110" fill="#0b1728"/>
  <text x="48" y="68" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="700">TESTLAND / Synthetic Identity Card</text>
  <rect x="42" y="145" width="916" height="410" fill="none" stroke="#155eef" stroke-width="4"/>
  <rect x="72" y="185" width="210" height="275" rx="4" fill="#d7deea"/>
  <rect x="125" y="235" width="105" height="105" fill="#667085"/>
  <rect x="102" y="350" width="150" height="80" fill="#667085"/>
  <g fill="#172033" font-family="sans-serif">
    <text x="330" y="215" font-size="28" font-weight="700">ALEX MOCK</text>
    <text x="330" y="260" font-family="monospace" font-size="22">NAME: ALEX MOCK</text>
    <text x="330" y="305" font-family="monospace" font-size="22">DOB: 1990-01-01</text>
    <text x="330" y="350" font-family="monospace" font-size="22">Synthetic Identity Card: TST-9000-0001</text>
    <text x="330" y="395" font-family="monospace" font-size="22">NATIONALITY: TESTLAND</text>
    <text x="330" y="440" font-family="monospace" font-size="22">PHONE: +1 202-555-0199</text>
    <text x="330" y="485" font-family="monospace" font-size="22">CUSTOMER: KYC-MOCK-COMPARE-001</text>
  </g>
  <g transform="translate(680 510) rotate(-10.313)" opacity="0.25">
    <text x="-230" y="0" fill="#b42318" font-family="sans-serif" font-size="58" font-weight="700">SYNTHETIC MOCK</text>
  </g>
</svg>
